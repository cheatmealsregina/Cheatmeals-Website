<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheatMeals — Home of Indian Burgers</title>
  <link rel="icon" href="/assets/favicon/favicon.svg">

  <!-- Design System tokens + components -->
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/tokens/fonts.css">
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/tokens/colors.css">
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/tokens/typography.css">
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/tokens/spacing.css">
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/tokens/effects.css">
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/tokens/base.css">
  <link rel="stylesheet" href="/_ds/cheatmeals-design-system-e4e5642f-825c-4537-9486-cbc4230dd10b/components/components.css">

  <!-- FOUC prevention: apply saved theme before first paint -->
  <script>
    (function() {
      var saved = localStorage.getItem('cm-theme');
      var preferred = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
</head>
<body>
  <!-- Logo SVGs, icon anatomy layers, seed data, image-slot web component.
       The design-system bundle is NOT loaded here — it needs window.React,
       so src/main.jsx injects it after exposing the npm React instance. -->
  <script src="/scripts/logos.js"></script>
  <script src="/scripts/icon-layers.js"></script>
  <script src="/scripts/data.js"></script>
  <script src="/scripts/image-slot.js"></script>

  <div id="root"></div>

  <!-- Vite app entry — deferred module, runs after all sync scripts above -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
