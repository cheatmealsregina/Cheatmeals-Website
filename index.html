  <!-- FOUC prevention: apply saved theme before first paint -->
  <script>
    (function() {
      var saved = localStorage.getItem('cm-theme');
      var preferred = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>

<body>
  <!-- Logo SVGs, icon anatomy layers, seed data, joke fallback. The

  <script src="/scripts/icon-layers.js"></script>
  <script src="/scripts/data.js"></script>
  <script src="/scripts/jokes-data.js"></script>

  <!-- Vite app entry — deferred module, runs after all sync scripts above -->
  <script type="module" src="/src/main.jsx"></script>
